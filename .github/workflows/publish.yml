name: CI / Publish

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      start: ${{ steps.filter.outputs.start }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - 'package.json'
              - 'bin/**'
              - 'lib/**'
              - 'templates/**'
            start:
              - 'playwright-pom-start/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          path-to-lcov: coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

  publish-root:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.root == 'true'
    needs: [changes, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Check if version is already published
        id: version_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view playwright-pom@$VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish playwright-pom to npm
        if: steps.version_check.outputs.already_published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Skip publish (already on npm)
        if: steps.version_check.outputs.already_published == 'true'
        run: echo "playwright-pom@${{ steps.version_check.outputs.version }} already on npm. Skipping."

  publish-start:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.start == 'true'
    needs: [changes, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version is already published
        id: version_check
        working-directory: playwright-pom-start
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view create-playwright-pom-start@$VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish create-playwright-pom-start to npm
        if: steps.version_check.outputs.already_published == 'false'
        working-directory: playwright-pom-start
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Skip publish (already on npm)
        if: steps.version_check.outputs.already_published == 'true'
        run: echo "create-playwright-pom-start@${{ steps.version_check.outputs.version }} already on npm. Skipping."
